# 昕动智能 - 完整开发环境
# 设备接入网关 + 干预引擎 + 数据基础设施
#
# 一键启动: docker-compose up
# 后台运行: docker-compose up -d
# 查看日志: docker-compose logs -f [service]
# 停止:     docker-compose down
#
# 服务端口:
#   kafka:                localhost:9092
#   mqtt (EMQX):          localhost:1883 (MQTT), 8083 (WebSocket), 18083 (Dashboard)
#   device-gateway:       http://localhost:4000
#   ble-simulator:        ws://localhost:8765
#   ruoyi-frontend:       http://localhost:3080
#
# 已在宿主机运行的服务 (不在此文件中启动):
#   ruoyi-backend:       http://localhost:8080  (Java/Spring Boot)
#   intervention-engine:  http://localhost:4001  (Python/FastAPI)
#   postgres:             localhost:5432         (Docker: xindong-postgres)
#   redis:                localhost:6379         (Docker: xindong-redis)
#   demo:                 http://localhost:3000  (Docker: healthhub-demo)

services:
  # ===========================================================================
  # RuoYi Vue3 前端 + Nginx 反向代理
  # ===========================================================================
  ruoyi-frontend:
    build:
      context: ./RuoYi-Vue3-master
      dockerfile: Dockerfile
    container_name: xindong-ruoyi-frontend
    ports:
      - "3080:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      device-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - xindong-network

  # ===========================================================================
  # 设备接入网关 - TypeScript/Node.js
  # ===========================================================================
  device-gateway:
    build:
      context: ./device-integration
      dockerfile: Dockerfile
    container_name: xindong-device-gateway
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - PORT=4000
      - HOST=0.0.0.0
      - API_KEY=${API_KEY:-xindong-dev-key}
      # Database - connect to existing xindong-postgres container
      - DB_HOST=xindong-postgres
      - DB_PORT=5432
      - DB_NAME=xindong
      - DB_USER=xindong
      - DB_PASSWORD=${DB_PASSWORD:-xindong123}
      # Kafka
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_TOPIC=xindong-device-data
      # Intervention Engine - running on host
      - INTERVENTION_ENGINE_URL=http://host.docker.internal:4001
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:4000/health 2>&1 | head -1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - xindong-network

  # ===========================================================================
  # Apache Kafka (消息流平台) - KRaft standalone mode
  # ===========================================================================
  kafka:
    image: docker.m.daocloud.io/apache/kafka:3.7.0
    container_name: xindong-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - xindong-network

  # ===========================================================================
  # MQTT Broker (EMQX - 设备协议支持)
  # ===========================================================================
  mqtt:
    image: docker.m.daocloud.io/emqx/emqx:5.3
    container_name: xindong-mqtt
    ports:
      - "1883:1883"     # MQTT
      - "8083:8083"     # MQTT over WebSocket
      - "18083:18083"   # EMQX Dashboard
    environment:
      EMQX_NAME: xindong-mqtt
      EMQX_HOST: 0.0.0.0
      EMQX_Dashboard__DEFAULT_USERNAME: admin
      EMQX_Dashboard__DEFAULT_PASSWORD: ${MQTT_PASSWORD:-public}
    volumes:
      - mqtt_data:/opt/emqx/data
      - mqtt_logs:/opt/emqx/log
    healthcheck:
      test: ["CMD", "emqx", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - xindong-network

  # ============================================================================
  # HealthHub BLE Simulator + MQTT Publisher
  # ============================================================================
  ble-simulator:
    image: docker.m.daocloud.io/python:3.11-slim
    container_name: xindong-ble-simulator
    working_dir: /app
    volumes:
      - ./demo:/app:ro
    command:
      - bash
      - -c
      - |
        pip install websockets paho-mqtt -q
        exec python3 ble_simulator.py \
          --ws-host 0.0.0.0 \
          --ws-port 8765 \
          --mqtt-url tcp://mqtt:1883 \
          --mqtt-client-id xindong-ble-simulator \
          --mqtt-username "${MQTT_USERNAME:-}" \
          --mqtt-password "${MQTT_PASSWORD:-}" \
          --interval 1.0
    environment:
      - MQTT_USERNAME=${MQTT_USERNAME:-}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-}
      - PYTHONUNBUFFERED=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8765:8765"
    depends_on:
      mqtt:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"print('ok')\" "]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - xindong-network

# =============================================================================
# Networks
# =============================================================================
networks:
  xindong-network:
    external: true
    name: xindong-network

# =============================================================================
# Volumes (persistent data)
# =============================================================================
volumes:
  kafka_data:
  mqtt_data:
  mqtt_logs:
